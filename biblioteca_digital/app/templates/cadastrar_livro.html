{% extends "layout.html" %}
{% block title %}Cadastrar Livro - Biblioteca Digital{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-4">Adicionar Novo Título</h2>
            <form action="{{ url_for('livro.cadastrar_livro') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Título do Livro</label>
                    <input type="text" name="titulo" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Autor</label>
                    <input type="text" name="autor" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <input type="text" name="categoria" class="form-control" required placeholder="Ex: Ficção, Ciência, História">
                </div>
                <div class="mb-3">
                    <label class="form-label">ISBN (Opcional)</label>
                    <input type="text" name="isbn" class="form-control" placeholder="Ex: 9788508045334">
                    <div class="form-text text-muted">Se informado, a capa correspondente será associada automaticamente.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">URL da Capa (Opcional)</label>
                    <input type="url" name="capa_url" class="form-control" placeholder="Ex: https://link-da-imagem.com/capa.jpg">
                    <div class="form-text text-muted">Deixe em branco para buscar automaticamente nas APIs públicas.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Cadastrar no Acervo</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
