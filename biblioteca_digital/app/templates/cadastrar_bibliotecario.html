{% extends "layout.html" %}
{% block title %}Cadastrar Bibliotecário - Biblioteca Digital{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 border-warning">
            <h2 class="mb-4">Novo Membro da Equipe</h2>
            <p class="text-muted">Registre um novo bibliotecário para gerenciar o acervo e empréstimos.</p>
            <hr>
            <form action="{{ url_for('admin.cadastrar_bibliotecario') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Profissional</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha Temporária</label>
                    <input type="password" name="senha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning w-100">Cadastrar Bibliotecário</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
