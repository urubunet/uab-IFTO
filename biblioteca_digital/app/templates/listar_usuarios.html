{% extends "layout.html" %}
{% block title %}Usuários - Biblioteca Digital{% endblock %}
{% block content %}
<h2 class="mb-4">Gerenciamento de Usuários</h2>
<div class="card p-4 shadow-sm">
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Papel</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.nome }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.papel }}</td>
                <td>
                    <form action="{{ url_for('admin.excluir_usuario', usuario_id=u.id) }}" method="POST" class="d-inline">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Excluir usuário?')">Excluir</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
