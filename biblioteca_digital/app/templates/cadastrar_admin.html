{% extends "layout.html" %}
{% block title %}Cadastrar Administrador - Biblioteca Digital{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 border-danger">
            <h2 class="mb-4">Novo Administrador</h2>
            <form action="{{ url_for('admin.cadastrar_admin') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Profissional</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha Temporária</label>
                    <input type="password" name="senha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-danger w-100">Cadastrar Administrador</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
