{% extends "layout.html" %}
{% block title %}Devoluções - Biblioteca Digital{% endblock %}
{% block content %}
<h2 class="mb-4">Histórico de Devoluções</h2>

<div class="card p-3 mb-4 bg-light shadow-sm">
    <div class="row g-3">
        <div class="col-md-6">
            <input type="text" id="buscaDevolucao" class="form-control" placeholder="Buscar por título ou leitor...">
        </div>
        <div class="col-md-3">
            <input type="date" id="dataDevolucao" class="form-control">
        </div>
    </div>
    <div class="mt-3">
        <button class="btn btn-outline-secondary btn-sm" onclick="filtrarStatus('')">Todos</button>
        <button class="btn btn-outline-info btn-sm" onclick="filtrarStatus('DEVOLVIDO')">Devolvido</button>
    </div>
</div>

<div class="card shadow-sm">
    <div class="table-responsive">
        <table class="table table-striped mb-0">
            <thead>
                <tr>
                    <th>Livro</th>
                    <th>Leitor</th>
                    <th>Data Solicitação</th>
                    <th>Data Devolução</th>
                </tr>
            </thead>
            <tbody id="tabelaDevolucoesBody">
                <!-- Os dados serão carregados via AJAX -->
            </tbody>
        </table>
    </div>
</div>

<script>
    function carregarDevolucoes() {
        const busca = document.getElementById('buscaDevolucao').value;
        const data = document.getElementById('dataDevolucao').value;
        
        let url = `/emprestimo/api/devolucoes?busca=${encodeURIComponent(busca)}&data_devolucao=${encodeURIComponent(data)}`;
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('tabelaDevolucoesBody');
                tbody.innerHTML = '';
                
                data.forEach(dev => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${dev.titulo}</td>
                            <td>${dev.usuario}</td>
                            <td>${dev.data_solicitacao}</td>
                            <td><span class="text-success">${dev.data_devolucao}</span></td>
                        </tr>
                    `;
                });
            });
    }

    document.getElementById('buscaDevolucao').addEventListener('input', carregarDevolucoes);
    document.getElementById('dataDevolucao').addEventListener('change', carregarDevolucoes);
    
    // Carregar ao abrir a página
    carregarDevolucoes();
    
    function filtrarStatus(status) {
        // Implementação adicional para status (exige ajuste na API se necessário)
        console.log("Filtrar por status:", status);
    }
</script>
{% endblock %}
