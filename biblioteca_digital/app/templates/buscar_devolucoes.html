{% extends "layout.html" %}
{% block title %}Devoluções - Biblioteca Digital{% endblock %}
{% block content %}
<h2 class="mb-4">Histórico de Devoluções</h2>

<div class="card p-3 mb-4 bg-light shadow-sm border-0">
    <div class="row g-3 align-items-end">
        <div class="col-md-5 position-relative">
            <label class="form-label small text-muted">Buscar Livro ou Leitor</label>
            <input type="text" id="buscaDevolucao" class="form-control" placeholder="Digite 3+ letras..." autocomplete="off">
            <div id="autocompleteList" class="list-group position-absolute w-100 shadow-sm" style="z-index: 1000;"></div>
        </div>
        <div class="col-md-2">
            <label class="form-label small text-muted">Data Devolução</label>
            <input type="date" id="dataDevolucao" class="form-control">
        </div>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Livro</th>
                    <th>Leitor</th>
                    <th>Status</th>
                    <th>Data Solicitação</th>
                    <th>Data Devolução</th>
                </tr>
            </thead>
            <tbody id="tabelaDevolucoesBody">
                <!-- Conteúdo carregado via AJAX -->
            </tbody>
        </table>
    </div>
</div>

<script src="{{ url_for('static', filename='js/devolucoes.js') }}"></script>
{% endblock %}
