{% extends "layout.html" %}
{% block title %}Devoluções - Biblioteca Digital{% endblock %}
{% block content %}
<h2 class="mb-4">Histórico de Devoluções</h2>

<div class="card p-3 mb-4 bg-light shadow-sm">
    <div class="row g-3">
        <div class="col-md-6 position-relative">
            <input type="text" id="buscaDevolucao" class="form-control" placeholder="Buscar por título ou leitor..." autocomplete="off">
            <div id="autocompleteList" class="list-group position-absolute w-100" style="z-index: 1000;"></div>
        </div>
        <div class="col-md-3">
            <input type="date" id="dataDevolucao" class="form-control">
        </div>
    </div>
    <div class="mt-3">
        <button class="btn btn-outline-secondary btn-sm" onclick="filtrarStatus('')">Todos</button>
        <button class="btn btn-outline-danger btn-sm" onclick="filtrarStatus('DEVOLVIDO')">Devolvido</button>
        <button class="btn btn-outline-success btn-sm" onclick="filtrarStatus('ATIVO')">Ativo</button>
        <button class="btn btn-outline-primary btn-sm" onclick="filtrarStatus('SOLICITADO')">Solicitado</button>
    </div>
</div>

<div class="card shadow-sm">
    <div class="table-responsive">
        <table class="table table-striped mb-0">
            <thead>
                <tr>
                    <th>Livro</th>
                    <th>Leitor</th>
                    <th>Status</th>
                    <th>Data Solicitação</th>
                    <th>Data Devolução</th>
                </tr>
            </thead>
            <tbody id="tabelaDevolucoesBody">
                <!-- Conteúdo dinâmico via AJAX -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentStatus = '';

    function carregarDevolucoes(termo = '', data = '', status = '') {
        let url = `/emprestimo/api/devolucoes?busca=${encodeURIComponent(termo)}&data_devolucao=${encodeURIComponent(data)}&status=${encodeURIComponent(status)}`;
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('tabelaDevolucoesBody');
                tbody.innerHTML = '';
                
                data.forEach(dev => {
                    let badgeClass = 'bg-info';
                    if (dev.status === 'DEVOLVIDO') badgeClass = 'bg-danger text-white';
                    if (dev.status === 'ATIVO') badgeClass = 'bg-success';
                    if (dev.status === 'SOLICITADO') badgeClass = 'bg-primary text-white';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>${dev.titulo}</td>
                            <td>${dev.usuario}</td>
                            <td><span class="badge ${badgeClass}">${dev.status}</span></td>
                            <td>${dev.data_solicitacao}</td>
                            <td>${dev.data_devolucao || '-'}</td>
                        </tr>
                    `;
                });
            });
    }

    // Autocomplete
    document.getElementById('buscaDevolucao').addEventListener('input', function() {
        const termo = this.value;
        if (termo.length >= 3) {
            fetch(`/emprestimo/api/autocomplete?q=${encodeURIComponent(termo)}`)
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('autocompleteList');
                    list.innerHTML = '';
                    data.forEach(item => {
                        list.innerHTML += `<button class="list-group-item list-group-item-action" onclick="selecionar('${item}')">${item}</button>`;
                    });
                });
        }
        carregarDevolucoes(termo, document.getElementById('dataDevolucao').value, currentStatus);
    });

    function selecionar(item) {
        document.getElementById('buscaDevolucao').value = item;
        document.getElementById('autocompleteList').innerHTML = '';
        carregarDevolucoes(item, document.getElementById('dataDevolucao').value, currentStatus);
    }

    document.getElementById('dataDevolucao').addEventListener('change', () => {
        carregarDevolucoes(document.getElementById('buscaDevolucao').value, document.getElementById('dataDevolucao').value, currentStatus);
    });

    function filtrarStatus(status) {
        currentStatus = status;
        carregarDevolucoes(document.getElementById('buscaDevolucao').value, document.getElementById('dataDevolucao').value, currentStatus);
    }
    
    // Carregar inicial
    carregarDevolucoes();
</script>
{% endblock %}
