{% extends "layout.html" %}
{% block title %}Cadastro de Leitor - Biblioteca Digital{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4">
            <h2 class="text-center mb-4">Novo Leitor</h2>
            <form action="{{ url_for('auth.cadastrar_leitor') }}" method="POST">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome Completo</label>
                    <input type="text" name="nome" id="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" name="senha" id="senha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Criar Conta</button>
            </form>
            <div class="text-center mt-3">
                <p>Já tem uma conta? <a href="{{ url_for('auth.login_view') }}">Faça login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
