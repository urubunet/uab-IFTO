{% extends "layout.html" %}
{% block title %}Editar Livro - Biblioteca Digital{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-4">Editar Livro</h2>
            <form action="{{ url_for('livro.editar_livro', livro_id=livro.id) }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" name="titulo" class="form-control" value="{{ livro.titulo }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Autor</label>
                    <input type="text" name="autor" class="form-control" value="{{ livro.autor }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <input type="text" name="categoria" class="form-control" value="{{ livro.categoria }}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Salvar Alterações</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
